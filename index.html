
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#182A47" />
<title>مذكّراتي الذكية — نسخة محلية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap');
:root{
  --ink:#16233A; --navy1:#182A47; --navy2:#1F3A63; --amber:#E9A03B;
  --bg:#EEF2F6; --line:#D5DDE6; --muted:#6B7A8D; --red:#C0392B; --green:#2ECC71;
}
*{ -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;
  background:var(--bg); color:var(--ink); min-height:100vh;
}
button{ font-family:inherit; cursor:pointer; }
input,textarea{ font-family:inherit; }
mark{ background:#FCE29A; border-radius:3px; padding:0 2px; color:inherit; }
::-webkit-scrollbar{ height:5px; width:8px; }
::-webkit-scrollbar-thumb{ background:#B8C4D2; border-radius:4px; }
button:focus-visible,input:focus-visible,textarea:focus-visible{ outline:2.5px solid var(--amber); outline-offset:2px; }

/* ===== الترويسة ===== */
.header{
  background:linear-gradient(160deg,var(--navy1) 0%,var(--navy2) 100%);
  color:#fff; padding:16px 16px 15px; border-radius:0 0 26px 26px;
  box-shadow:0 6px 24px rgba(24,42,71,.25); position:sticky; top:0; z-index:20;
}
.header-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:13px; }
.brand{ margin:0; font-size:20px; font-weight:700; }
.brand-sub{ margin:4px 0 0; font-size:11.5px; color:#AFC3DD; }
.head-actions{ display:flex; gap:7px; flex-shrink:0; }
.hbtn{
  width:38px; height:38px; border-radius:12px; border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.1); color:#fff; display:grid; place-items:center;
}
.hbtn svg{ width:17px; height:17px; }
.searchbar{
  display:flex; align-items:center; gap:8px; background:#fff; border-radius:15px;
  padding:9px 12px; box-shadow:0 3px 10px rgba(0,0,0,.12); transition:box-shadow .25s;
}
.searchbar.listening{ box-shadow:0 0 0 3px rgba(233,160,59,.5); }
.searchbar input{
  flex:1; border:none; outline:none; font-size:15px; background:transparent; color:var(--ink); min-width:0;
}
.mic-btn{
  width:34px; height:34px; border-radius:11px; border:none; background:var(--navy1);
  color:#fff; display:grid; place-items:center; flex-shrink:0;
}
.mic-btn.live{ background:var(--amber); color:var(--navy1); }
.ghost-x{ border:none; background:transparent; color:#8FA0B5; padding:4px; display:grid; place-items:center; }
.color-row{ display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding-bottom:2px; align-items:center; }
.chip-all{
  border-radius:999px; border:none; background:#fff; color:var(--navy1); font-size:12px;
  font-weight:700; padding:5px 13px; flex-shrink:0;
}
.cchip{
  width:27px; height:27px; border-radius:50%; border:1.5px solid; flex-shrink:0;
  display:grid; place-items:center; padding:0;
}

/* ===== القائمة ===== */
.main{ padding:16px 16px 130px; max-width:980px; margin:0 auto; }
.day-div{ display:flex; align-items:center; gap:10px; margin:20px 2px 12px; }
.day-label{ font-size:13.5px; font-weight:700; color:#33475F; white-space:nowrap; }
.day-line{ flex:1; height:1px; background:var(--line); }
.day-lock{
  border:1px solid var(--line); background:#fff; color:#33475F; border-radius:999px;
  font-size:11px; font-weight:700; padding:4px 11px; display:inline-flex; align-items:center; gap:5px;
  white-space:nowrap;
}
.day-lock svg{ width:11px; height:11px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr)); gap:12px; }
.card{
  border:1.5px solid; border-radius:18px; padding:14px 15px 12px; cursor:pointer;
  box-shadow:0 2px 8px rgba(22,35,58,.07); display:flex; flex-direction:column; gap:8px;
  transition:transform .15s, box-shadow .15s; overflow-wrap:break-word;
}
.card:hover{ transform:translateY(-2px); box-shadow:0 6px 18px rgba(22,35,58,.13); }
.card-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.card-title{ margin:0; font-size:15.5px; font-weight:700; line-height:1.5; }
.pin-btn{ border:none; background:transparent; padding:3px; flex-shrink:0; }
.pin-btn svg{ width:16px; height:16px; }
.card-text{ margin:0; font-size:13.5px; line-height:1.85; opacity:.85; white-space:pre-wrap; }
.thumbs{ display:flex; gap:6px; align-items:center; }
.thumbs img{ width:52px; height:52px; border-radius:10px; object-fit:cover; border:1px solid rgba(0,0,0,.1); }
.more-thumb{ font-size:12px; font-weight:700; opacity:.6; }
.card-foot{ display:flex; justify-content:space-between; align-items:center; margin-top:2px; }
.meta-line{ display:flex; gap:8px; align-items:center; font-size:11.5px; opacity:.65; }
.badge{ display:inline-flex; align-items:center; gap:3px; background:rgba(0,0,0,.07); border-radius:6px; padding:2px 6px; font-size:10.5px; font-weight:700; }
.badge svg{ width:11px; height:11px; }
.mini-del{ border:none; background:transparent; color:rgba(0,0,0,.3); padding:4px; display:grid; place-items:center; border-radius:6px; }
.mini-del svg{ width:14px; height:14px; }
.tags{ display:flex; gap:6px; flex-wrap:wrap; }
.tag{
  display:inline-flex; align-items:center; font-size:11px; font-weight:600;
  border:1px solid; border-radius:999px; padding:2px 9px; background:rgba(255,255,255,.55);
}
.locked-card{ align-items:center; text-align:center; gap:6px; justify-content:center; min-height:120px; }
.locked-card .lockico{ font-size:26px; }
.fab{
  position:fixed; bottom:24px; left:20px; width:58px; height:58px; border-radius:19px;
  border:none; background:var(--amber); color:var(--navy1);
  box-shadow:0 8px 22px rgba(233,160,59,.5); display:grid; place-items:center; z-index:30;
}
.fab svg{ width:24px; height:24px; }
.empty{ text-align:center; padding:56px 20px; color:#33475F; }
.empty .art{ font-size:52px; margin-bottom:12px; }
.empty p{ color:var(--muted); line-height:1.9; font-size:14px; }
.empty-cta{
  margin-top:16px; display:inline-flex; align-items:center; gap:8px; background:var(--navy1);
  color:#fff; border:none; border-radius:13px; padding:11px 22px; font-size:14.5px; font-weight:700;
}

/* ===== المحرر ===== */
.edit-screen{ min-height:100vh; display:flex; flex-direction:column; transition:background .35s; }
.edit-bar{
  display:flex; justify-content:space-between; align-items:center; padding:12px 14px;
  border-bottom:1.5px solid; position:sticky; top:0; background:inherit; z-index:20; backdrop-filter:blur(6px); gap:8px;
}
.top-btn{
  border:none; background:rgba(0,0,0,.06); border-radius:11px; width:38px; height:38px;
  display:grid; place-items:center; color:inherit; flex-shrink:0;
}
.top-btn svg{ width:18px; height:18px; }
.edit-main{ flex:1; padding:16px 18px 150px; max-width:760px; width:100%; margin:0 auto; }
.title-input{
  width:100%; border:none; outline:none; background:transparent; font-size:22px;
  font-weight:700; margin-bottom:6px; color:inherit;
}
.text-area{
  width:100%; border:none; outline:none; background:transparent; font-size:15.5px;
  line-height:2; resize:vertical; min-height:180px; color:inherit;
}
.section{ margin-top:18px; }
.section h4{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700; margin:0 0 9px; opacity:.8; }
.section h4 svg{ width:14px; height:14px; }
.audio-row{
  display:flex; align-items:center; gap:8px; border:1.5px solid; border-radius:13px;
  padding:6px 10px; margin-bottom:8px; background:rgba(255,255,255,.55);
}
.audio-row audio{ flex:1; height:38px; max-width:100%; border-radius:10px; min-width:0; }
.img-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
.img-cell{ position:relative; }
.img-cell img{
  width:100%; height:130px; object-fit:cover; border-radius:13px; cursor:zoom-in;
  border:1px solid rgba(0,0,0,.12); display:block;
}
.img-del{
  position:absolute; top:6px; left:6px; width:26px; height:26px; border-radius:9px;
  border:none; background:rgba(0,0,0,.55); color:#fff; display:grid; place-items:center;
}
.img-del svg{ width:12px; height:12px; }
.tag-edit{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.tag-edit .tag{ font-size:12.5px; padding:4px 10px; }
.tag-x{ border:none; background:transparent; padding:2px; margin-right:4px; display:grid; place-items:center; color:inherit; opacity:.6; }
.tag-x svg{ width:10px; height:10px; }
.tag-input{
  border:1.5px dashed; border-radius:999px; padding:5px 12px; font-size:12.5px;
  background:transparent; outline:none; width:120px; color:inherit;
}
.tool-dock{
  position:fixed; bottom:0; left:0; right:0; z-index:40; display:flex; gap:8px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(24,42,71,.96); backdrop-filter:blur(8px); justify-content:center; flex-wrap:wrap;
}
.tool{
  display:inline-flex; align-items:center; gap:7px; border:none; background:rgba(255,255,255,.12);
  color:#fff; border-radius:13px; padding:10px 13px; font-size:12.5px; font-weight:700;
}
.tool svg{ width:18px; height:18px; }
.tool.live{ background:var(--amber); color:var(--navy1); }
.tool.rec{ background:#E74C3C; color:#fff; }
.tool.save{ background:var(--green); color:#0B3D22; }
.lock-state{
  display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700;
  border:1.5px solid; border-radius:999px; padding:6px 13px; background:rgba(255,255,255,.5); color:inherit;
}

/* ===== نوافذ ومكوّنات عامة ===== */
.toast{
  position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:var(--navy1);
  color:#fff; padding:10px 20px; border-radius:12px; font-size:13.5px;
  box-shadow:0 6px 18px rgba(0,0,0,.3); z-index:300; max-width:88vw; text-align:center;
}
.modal-veil{
  position:fixed; inset:0; background:rgba(10,16,26,.55); z-index:200;
  display:grid; place-items:center; padding:20px; backdrop-filter:blur(3px);
}
.modal{
  background:#fff; border-radius:20px; padding:22px 20px; width:100%; max-width:380px;
  box-shadow:0 16px 50px rgba(0,0,0,.35);
}
.modal h3{ margin:0 0 6px; font-size:17px; }
.modal p{ margin:0 0 14px; font-size:13px; color:var(--muted); line-height:1.8; }
.modal input[type=password], .modal input[type=text]{
  width:100%; border:1.5px solid var(--line); border-radius:12px; padding:11px 13px;
  font-size:16px; outline:none; margin-bottom:10px;
}
.modal input:focus{ border-color:var(--amber); }
.modal-btns{ display:flex; gap:8px; margin-top:6px; }
.mbtn{ flex:1; border:none; border-radius:12px; padding:11px; font-size:14px; font-weight:700; }
.mbtn.primary{ background:var(--navy1); color:#fff; }
.mbtn.ghost{ background:#EDF1F5; color:var(--ink); }
.mbtn.danger{ background:#FDECEA; color:var(--red); }
.modal .err{ color:var(--red); font-size:12.5px; margin:-4px 0 8px; display:none; }
.lightbox{
  position:fixed; inset:0; background:rgba(10,16,26,.92); z-index:250;
  display:grid; place-items:center; cursor:zoom-out; padding:20px;
}
.lightbox img{ max-width:94vw; max-height:88vh; border-radius:14px; box-shadow:0 10px 40px rgba(0,0,0,.5); }
.pulse{ animation:pulseAnim 1.2s ease-in-out infinite; }
@keyframes pulseAnim{ 0%,100%{ box-shadow:0 0 0 0 rgba(233,160,59,.55);} 50%{ box-shadow:0 0 0 9px rgba(233,160,59,0);} }
.settings-list{ display:flex; flex-direction:column; gap:9px; }
.settings-item{
  display:flex; align-items:center; gap:10px; border:1.5px solid var(--line);
  background:#F8FAFC; border-radius:14px; padding:12px 13px; font-size:13.5px; font-weight:600;
  color:var(--ink); text-align:right; width:100%;
}
.settings-item svg{ width:17px; height:17px; flex-shrink:0; color:var(--navy2); }
.settings-item small{ display:block; font-weight:400; color:var(--muted); font-size:11.5px; margin-top:2px; }
@media (prefers-reduced-motion:reduce){ .pulse{ animation:none; } .card:hover{ transform:none; } }
</style>
</head>
<body>
<div id="app"></div>

<input type="file" id="bakPick" accept=".json,application/json" style="display:none" />

<script>
"use strict";
/* =====================================================================
   مذكّراتي الذكية — نسخة محلية 100%
   التخزين: IndexedDB على جهازك فقط (لا يُرسل أي شيء لأي خادم)
   القفل: تشفير حقيقي AES-256-GCM بمفتاح مشتق من كلمة سرّك (PBKDF2)
   ===================================================================== */

// ---------- الألوان ----------
const PAGE_COLORS = [
  { id:"paper", name:"ورقي",    bg:"#FFFFFF", edge:"#D8DEE6", ink:"#1C2A3A" },
  { id:"sand",  name:"رملي",    bg:"#FBF3E4", edge:"#E8D5AE", ink:"#5A4416" },
  { id:"rose",  name:"وردي",    bg:"#FCEDF1", edge:"#F0C4D0", ink:"#6B2237" },
  { id:"mint",  name:"نعناعي",  bg:"#E9F7EF", edge:"#BCE3CC", ink:"#1B5637" },
  { id:"sky",   name:"سماوي",   bg:"#E9F3FB", edge:"#BDD9EF", ink:"#1B4368" },
  { id:"lilac", name:"بنفسجي",  bg:"#F1EDFB", edge:"#D3C8F0", ink:"#3E2C6E" },
  { id:"lemon", name:"ليموني",  bg:"#FDF8E1", edge:"#EDE0A0", ink:"#5C5010" },
];
const colorOf = id => PAGE_COLORS.find(c=>c.id===id) || PAGE_COLORS[0];

// ---------- أدوات نصية ----------
const esc = s => String(s??"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
function normalizeAr(s=""){
  return s.toLowerCase()
    .replace(/[\u064B-\u065F\u0670]/g,"")
    .replace(/[أإآٱ]/g,"ا").replace(/ة/g,"ه").replace(/ى/g,"ي")
    .replace(/ؤ/g,"و").replace(/ئ/g,"ي")
    .replace(/\s+/g," ").trim();
}
const DAY_NAMES = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
function dayKey(ts){ return new Date(ts).toDateString(); }
function dayLabel(ts){
  const d=new Date(ts), t=new Date(), y=new Date(); y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString()) return "اليوم";
  if(d.toDateString()===y.toDateString()) return "أمس";
  return DAY_NAMES[d.getDay()]+" "+d.toLocaleDateString("ar-EG",{day:"numeric",month:"long",year:"numeric"});
}
function timeLabel(ts){ return new Date(ts).toLocaleTimeString("ar-EG",{hour:"numeric",minute:"2-digit"}); }

// ---------- أيقونات ----------
const I = {
  mic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  image:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>',
  pin:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 3a1 1 0 0 1 .97 1.24l-1.1 4.4 3.42 3.42a1 1 0 0 1-.7 1.7H13v6l-1 3-1-3v-6H5.4a1 1 0 0 1-.7-1.7l3.42-3.42-1.1-4.4A1 1 0 0 1 8 3z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  stop:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>',
  tag:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 13.4 12 22 2 12V2h10l8.6 8.6a2 2 0 0 1 0 2.8Z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>',
  wave:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="10" x2="4" y2="14"/><line x1="8" y1="7" x2="8" y2="17"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="16" y1="7" x2="16" y2="17"/><line x1="20" y1="10" x2="20" y2="14"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>',
  copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>',
  unlock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2.5"/><path d="M8 10V7a4 4 0 0 1 7.5-2"/></svg>',
  gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1Z"/></svg>',

// ---------- IndexedDB ----------
let _db = null;
function openDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r = indexedDB.open("smart-notes-local", 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains("notes")) d.createObjectStore("notes",{keyPath:"id"});
      if(!d.objectStoreNames.contains("meta"))  d.createObjectStore("meta",{keyPath:"k"});
    };
    r.onsuccess = ()=>{ _db=r.result; res(_db); };
    r.onerror   = ()=>rej(r.error);
  });
}
function tx(store, mode, fn){
  return openDB().then(db => new Promise((res,rej)=>{
    const t = db.transaction(store, mode);
    const s = t.objectStore(store);
    const out = fn(s);
    t.oncomplete = ()=>res(out && out.result !== undefined ? out.result : undefined);
    t.onerror = ()=>rej(t.error);
  }));
}
const dbAllNotes = ()=>openDB().then(db=>new Promise((res,rej)=>{
  const q = db.transaction("notes").objectStore("notes").getAll();
  q.onsuccess=()=>res(q.result||[]); q.onerror=()=>rej(q.error);
}));
const dbPut = n => tx("notes","readwrite", s=>s.put(n));
const dbDel = id => tx("notes","readwrite", s=>s.delete(id));
const metaGet = k => openDB().then(db=>new Promise((res,rej)=>{
  const q = db.transaction("meta").objectStore("meta").get(k);
  q.onsuccess=()=>res(q.result ? q.result.v : null); q.onerror=()=>rej(q.error);
}));
const metaSet = (k,v)=>tx("meta","readwrite", s=>s.put({k,v}));

// ---------- التشفير (AES-256-GCM + PBKDF2) ----------
const b64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const unb64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function deriveKey(pass, saltB64){
  const mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt:unb64(saltB64), iterations:210000, hash:"SHA-256" },
    mat, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]
  );
}
async function encObj(obj, pass, saltB64){
  const key = await deriveKey(pass, saltB64);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
  return { salt:saltB64, iv:b64(iv), ct:b64(ct) };
}
async function decObj(pack, pass){
  const key = await deriveKey(pass, pack.salt);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:unb64(pack.iv)}, key, unb64(pack.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

// طلب كلمة السر والتحقق منها
function askPassword(title){
  return new Promise(res=>{
    const v = modal('<h3>'+esc(title||"أدخل كلمة السر")+'</h3>'+
      '<input type="password" id="pp" placeholder="كلمة السر" />'+
      '<div class="err" id="perr">كلمة السر غير صحيحة</div>'+
      '<div class="modal-btns"><button class="mbtn ghost" data-a="no">إلغاء</button>'+
      '<button class="mbtn primary" data-a="yes">فتح</button></div>');
    const inp = v.querySelector("#pp"), err = v.querySelector("#perr");
    const submit = async ()=>{
      const p = inp.value; if(!p) return;
      try{
        await decObj(sec.verifier, p);       // التحقق
        sessionPass = p;
        v.remove(); res(p);
      }catch(e){ err.style.display="block"; inp.select(); }
    };
    v.querySelector('[data-a=no]').onclick = ()=>{ v.remove(); res(null); };
    v.querySelector('[data-a=yes]').onclick = submit;
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
    setTimeout(()=>inp.focus(), 50);
  });
}
// ضمان توفر كلمة السر بالجلسة (ينشئها أو يطلبها)
async function ensurePass(reason){
  if(sessionPass) return sessionPass;
  if(!sec){
    const p = await askNewPassword();
    if(!p) return null;
    const salt = b64(crypto.getRandomValues(new Uint8Array(16)));
    const verifier = await encObj({ok:1}, p, salt);
    sec = { salt, verifier };
    await metaSet("sec", sec);
    sessionPass = p;
    toast("أُنشئت كلمة السر ✓");
    return p;
  }
  return await askPassword(reason || "أدخل كلمة السر");
}

// ---------- قفل / فك ----------
async function lockNoteRecord(n){
  // يحوّل مذكرة مفتوحة إلى سجل مشفّر
  const payload = { title:n.title, text:n.text, tags:n.tags||[], images:n.images||[], audios:n.audios||[] };
  const enc = await encObj(payload, sessionPass, sec.salt);
  return { id:n.id, locked:true, enc, color:n.color, pinned:!!n.pinned, createdAt:n.createdAt, updatedAt:Date.now() };
}
async function unlockToMemory(n){
  // يفك التشفير للجلسة فقط (يبقى مشفراً على القرص)
  if(unlocked[n.id]) return unlocked[n.id];
  if(!sessionPass){ const p = await ensurePass("أدخل كلمة السر لفتح المذكرة"); if(!p) return null; }
  try{
    const payload = await decObj(n.enc, sessionPass);
    unlocked[n.id] = payload;
    return payload;
  }catch(e){
    toast("كلمة السر لا تفتح هذه المذكرة");
    return null;
  }
}

    + '<div class="color-row">'
    + '<button class="chip-all" id="chipAll" style="'+(!colorFilter?'outline:2px solid #fff;outline-offset:2px':'')+'">الكل</button>'
    + PAGE_COLORS.map(c=>'<button class="cchip" data-cf="'+c.id+'" title="'+c.name+'" aria-label="فلترة '+c.name+'" style="background:'+c.bg+';border-color:'+c.edge+';'+(colorFilter===c.id?'outline:2.5px solid #fff;outline-offset:2px':'')+'"></button>').join("")

      + '<button class="empty-cta" id="emptyNew">'+I.plus+' مذكرة جديدة</button></div>';
  } else if(list.length===0){
    h += '<div class="empty"><div class="art">🔍</div><p>لا نتائج مطابقة.'+(stats.locked&&q?'<br><small>المذكرات المقفلة لا تظهر في البحث إلا بعد فتحها بكلمة السر.</small>':'')+'</p></div>';
  }

  const cardHTML = n => {
    const c = colorOf(n.color);
    if(n.locked && !unlocked[n.id]){

    const si = document.getElementById("searchInput"); if(si) si.value = query;

  searchRec.onerror = ()=>{ searchLive=false; ui(); toast("تعذّر الاستماع — تحقق من إذن الميكروفون"); };
  const ui = ()=>{
    const bar = document.getElementById("searchbar"), mb = document.getElementById("voiceSearch");
    if(bar) bar.classList.toggle("listening", searchLive);
    if(mb){ mb.classList.toggle("live", searchLive); mb.classList.toggle("pulse", searchLive); }

}

// ---------- فتح مذكرة ----------
async function openNote(id){
  const n = notes.find(x=>x.id===id); if(!n) return;
  if(n.locked){
    const payload = await unlockToMemory(n);
    if(!payload) return;
    editing = { id:n.id, color:n.color, pinned:n.pinned, createdAt:n.createdAt, updatedAt:n.updatedAt,
                title:payload.title||"", text:payload.text||"", tags:(payload.tags||[]).slice(),
                images:(payload.images||[]).slice(), audios:(payload.audios||[]).slice(), locked:true };
    editingWasLocked = true;
  } else {
    editing = JSON.parse(JSON.stringify(n));
    editing.locked = false;
    editingWasLocked = false;
  }
  renderEditor();
}

}

async function saveEditing(goBack){
  const n = editing;
  if(!n.title.trim() && !n.text.trim() && !n.images.length && !n.audios.length){
    if(goBack) renderList();
    return;
  }
  let record;
  if(n.locked){
    if(!sessionPass){ const p = await ensurePass(); if(!p){ toast("لم يُحفظ بعد — أدخل كلمة السر أولاً"); return; } }
    record = await lockNoteRecord(n);
    unlocked[n.id] = { title:n.title, text:n.text, tags:n.tags, images:n.images, audios:n.audios };
  } else {
    record = { id:n.id, locked:false, title:n.title, text:n.text, color:n.color, tags:n.tags,
               images:n.images, audios:n.audios, pinned:n.pinned, createdAt:n.createdAt, updatedAt:Date.now() };
    delete unlocked[n.id];
  }
  try{
    await dbPut(record);
  }catch(e){
    toast("تعذّر الحفظ — قد تكون مساحة المتصفح ممتلئة"); return;
  }
  notes = notes.filter(x=>x.id!==n.id);
  notes.unshift(record);
  notes.sort((a,b)=>b.updatedAt-a.updatedAt);
  toast("تم الحفظ على جهازك ✓");
  if(goBack) renderList();
}

// ---------- المحرر ----------
let dictRec=null, dictLive=false, baseText="";
let mediaRec=null, recLive=false, recSecs=0, recTimer=null, recChunks=[];
const MAX_REC = 300; // ٥ دقائق

function renderEditor(){
  stopDictation(); stopRecorderSilently();
  const n = editing, c = colorOf(n.color);
  document.body.style.background = c.bg;

  let h = '<div class="edit-screen" style="background:'+c.bg+'">'
    + '<div class="edit-bar" style="border-color:'+c.edge+';color:'+c.ink+'">'
    + '<button class="top-btn" id="btnBack" aria-label="حفظ والرجوع">'+I.back+'</button>'
    + '<span style="font-size:12.5px;opacity:.6">'+dayLabel(n.createdAt)+' · '+timeLabel(n.createdAt)+'</span>'
    + '<div style="display:flex;gap:6px">'
    + '<button class="top-btn" id="btnLock" aria-label="قفل" title="'+(n.locked?"مقفلة — اضغط لإلغاء القفل":"قفل بكلمة سر")+'" style="'+(n.locked?'background:#E9A03B;color:#182A47':'')+'">'+(n.locked?I.lock:I.unlock)+'</button>'
    + '<button class="top-btn" id="btnCopy" aria-label="نسخ النص">'+I.copy+'</button>'
    + '<button class="top-btn" id="btnDel" aria-label="حذف" style="color:#C0392B">'+I.trash+'</button>'
    + '</div></div>'
    + '<div class="edit-main" style="color:'+c.ink+'">'
    + '<div class="color-row" id="colorPick" style="margin-bottom:6px"></div>'
    + (n.locked?'<div style="margin:4px 0 10px"><span class="lock-state" style="border-color:'+c.edge+'">🔒 هذه المذكرة مشفّرة بكلمة السر — لا يقرؤها أحد سواك</span></div>':'')
    + '<input class="title-input" id="fTitle" placeholder="عنوان المذكرة…" />'
    + '<textarea class="text-area" id="fText" rows="9" placeholder="اكتب هنا… أو اضغط زر الإملاء وتحدّث"></textarea>'
    + '<div id="secAudios" class="section"></div>'
    + '<div id="secImages" class="section"></div>'
    + '<div class="section"><h4 style="color:'+c.ink+'">'+I.tag+' وسوم للبحث السريع</h4><div class="tag-edit" id="tagBox"></div></div>'
    + '</div>'
    + '<div class="tool-dock">'
    + '<button class="tool" id="tDict">'+I.mic+'<span>إملاء ← نص</span></button>'
    + '<button class="tool" id="tRec">'+I.wave+'<span>تسجيل صوتي</span></button>'
    + '<button class="tool" id="tImg">'+I.image+'<span>صورة / فاتورة</span></button>'
    + '<button class="tool save" id="tSave">'+I.check+'<span>حفظ</span></button>'
    + '</div></div>';
  app.innerHTML = h;

  // قيم الحقول (تعيين بالقيمة لتفادي مشاكل HTML)
  const fT = document.getElementById("fTitle"), fX = document.getElementById("fText");
  fT.value = n.title; fX.value = n.text;
  fT.addEventListener("input", ()=>{ n.title = fT.value; });
  fX.addEventListener("input", ()=>{ n.text = fX.value; baseText=""; });

  renderColorPick(); renderAudios(); renderImages(); renderTags();

  document.getElementById("btnBack").onclick = ()=>saveEditing(true);
  document.getElementById("tSave").onclick = ()=>saveEditing(true);
  document.getElementById("btnCopy").onclick = ()=>{
    navigator.clipboard?.writeText((n.title?n.title+"\n\n":"")+n.text);
    toast("نُسخ النص ✓");
  };
  document.getElementById("btnDel").onclick = async ()=>{
    if(!(await askConfirm("حذف المذكرة","سيتم حذفها نهائياً من هذا الجهاز.","حذف",true))) return;
    await dbDel(n.id);
    notes = notes.filter(x=>x.id!==n.id); delete unlocked[n.id];
    toast("حُذفت المذكرة"); renderList();
  };
  document.getElementById("btnLock").onclick = toggleLockEditing;
  document.getElementById("tDict").onclick = toggleDictation;
  document.getElementById("tRec").onclick = toggleRecorder;
  document.getElementById("tImg").onclick = ()=>document.getElementById("imgPick").click();
}

async function toggleLockEditing(){
  const n = editing;
  if(!n.locked){
    const p = await ensurePass("أدخل كلمة السر لقفل المذكرة");
    if(!p) return;
    n.locked = true;
    toast("ستُشفَّر المذكرة عند الحفظ 🔒");
  } else {
    if(!(await askConfirm("إلغاء القفل","ستُحفظ المذكرة بدون تشفير ويمكن لأي مستخدم للجهاز قراءتها.","إلغاء القفل"))) return;
    n.locked = false;
    toast("أُلغي القفل عن المذكرة");
  }
  renderEditor();
}

function renderColorPick(){
  const box = document.getElementById("colorPick"); if(!box) return;
  const n = editing;
  box.innerHTML = PAGE_COLORS.map(cc=>
    '<button class="cchip" data-c="'+cc.id+'" aria-label="لون '+cc.name+'" style="background:'+cc.bg+';border-color:'+cc.edge+';'+(n.color===cc.id?'outline:2.5px solid '+cc.ink+';outline-offset:2px':'')+'">'
    +(n.color===cc.id?'<span style="color:'+cc.ink+';width:13px;height:13px;display:grid">'+I.check+'</span>':'')+'</button>').join("");
  box.querySelectorAll("[data-c]").forEach(b=>b.onclick=()=>{ n.color=b.dataset.c; renderEditor(); });
}

function renderAudios(){
  const box = document.getElementById("secAudios"); if(!box) return;
  const n = editing, c = colorOf(n.color);
  if(!n.audios.length){ box.innerHTML=""; return; }
  box.innerHTML = '<h4 style="color:'+c.ink+'">'+I.wave+' التسجيلات الصوتية</h4>'
    + n.audios.map((a,i)=>'<div class="audio-row" style="border-color:'+c.edge+'">'
      + '<audio src="'+a.dataUrl+'" controls></audio>'
      + '<span style="font-size:11px;opacity:.6;white-space:nowrap">'+(a.secs?a.secs+' ث':'')+'</span>'
      + '<button class="mini-del" data-da="'+i+'" aria-label="حذف التسجيل">'+I.x+'</button></div>').join("");
  box.querySelectorAll("[data-da]").forEach(b=>b.onclick=()=>{
    n.audios.splice(+b.dataset.da,1); renderAudios();
  });
}

function renderImages(){
  const box = document.getElementById("secImages"); if(!box) return;
  const n = editing, c = colorOf(n.color);
  if(!n.images.length){ box.innerHTML=""; return; }
  box.innerHTML = '<h4 style="color:'+c.ink+'">'+I.receipt+' الصور والفواتير</h4><div class="img-grid">'
    + n.images.map((src,i)=>'<div class="img-cell"><img src="'+src+'" data-lb="'+i+'" alt="مرفق" />'
      + '<button class="img-del" data-di="'+i+'" aria-label="حذف الصورة">'+I.x+'</button></div>').join("")+'</div>';
  box.querySelectorAll("[data-di]").forEach(b=>b.onclick=()=>{ n.images.splice(+b.dataset.di,1); renderImages(); });
  box.querySelectorAll("[data-lb]").forEach(img=>img.onclick=()=>{
    const lb = document.createElement("div");
    lb.className = "lightbox";
    lb.innerHTML = '<img src="'+n.images[+img.dataset.lb]+'" alt="" />';
    lb.onclick = ()=>lb.remove();
    document.body.appendChild(lb);
  });
}

function renderTags(){
  const box = document.getElementById("tagBox"); if(!box) return;
  const n = editing, c = colorOf(n.color);
  box.innerHTML = n.tags.map((t,i)=>'<span class="tag" style="border-color:'+c.edge+'">#'+esc(t)
    + '<button class="tag-x" data-dt="'+i+'" aria-label="إزالة">'+I.x+'</button></span>').join("")
    + '<input class="tag-input" id="tagIn" placeholder="+ وسم جديد" style="border-color:'+c.edge+';color:'+c.ink+'" />';
  box.querySelectorAll("[data-dt]").forEach(b=>b.onclick=()=>{ n.tags.splice(+b.dataset.dt,1); renderTags(); });
  const ti = document.getElementById("tagIn");
  const add = ()=>{
    const t = ti.value.trim().replace(/^#/,"");
    if(t && !n.tags.includes(t)){ n.tags.push(t); renderTags(); document.getElementById("tagIn").focus(); }
    else ti.value="";
  };
  ti.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); add(); } });
  ti.addEventListener("blur", add);
}

// ---------- الإملاء الصوتي ----------
function toggleDictation(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("الإملاء الصوتي غير مدعوم — جرّب Chrome أو Safari حديث"); return; }
  if(dictLive){ stopDictation(); return; }
  dictRec = new SR();
  dictRec.lang="ar-SA"; dictRec.continuous=true; dictRec.interimResults=true;
  baseText = editing.text ? editing.text.replace(/\s*$/,"")+" " : "";
  dictRec.onresult = e=>{
    const spoken = Array.from(e.results).map(r=>r[0].transcript).join(" ");
    editing.text = baseText + spoken;
    const fX = document.getElementById("fText");
    if(fX){ fX.value = editing.text; fX.scrollTop = fX.scrollHeight; }
  };
  dictRec.onend = ()=>{ dictLive=false; dictUI(); };
  dictRec.onerror = e=>{ dictLive=false; dictUI(); if(e.error==="not-allowed") toast("يرجى السماح بالوصول إلى الميكروفون"); };
  dictLive = true; dictUI(); dictRec.start();
  toast("🎙️ أنا أستمع… تحدّث الآن");
}
function stopDictation(){ if(dictRec){ try{dictRec.stop();}catch(e){} } dictLive=false; dictUI(); }
function dictUI(){
  const b = document.getElementById("tDict"); if(!b) return;
  b.classList.toggle("live", dictLive); b.classList.toggle("pulse", dictLive);
  b.innerHTML = (dictLive?I.stop:I.mic)+'<span>'+(dictLive?"إيقاف الإملاء":"إملاء ← نص")+'</span>';
}

// ---------- التسجيل الصوتي ----------
async function toggleRecorder(){
  if(recLive){ try{mediaRec.stop();}catch(e){} return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec = new MediaRecorder(stream);
    recChunks = []; recSecs = 0;
    mediaRec.ondataavailable = e=>{ if(e.data.size) recChunks.push(e.data); };
    mediaRec.onstop = ()=>{
      clearInterval(recTimer);
      stream.getTracks().forEach(t=>t.stop());
      const blob = new Blob(recChunks, {type: mediaRec.mimeType || "audio/webm"});
      const secs = recSecs;
      recLive=false; recUI();
      if(blob.size > 25*1024*1024){ toast("التسجيل كبير جداً"); return; }
      const fr = new FileReader();
      fr.onload = ()=>{
        editing.audios.push({dataUrl:fr.result, secs, at:Date.now()});
        renderAudios(); toast("أُضيف التسجيل الصوتي ✓");
      };
      fr.readAsDataURL(blob);
    };
    mediaRec.start();
    recLive = true; recUI();
    recTimer = setInterval(()=>{
      recSecs++;
      if(recSecs>=MAX_REC){ try{mediaRec.stop();}catch(e){} }
      recUI();
    },1000);
  }catch(e){ toast("تعذّر فتح الميكروفون — تحقق من الأذونات"); }
}
function stopRecorderSilently(){
  clearInterval(recTimer);
  if(mediaRec && mediaRec.state==="recording"){ try{mediaRec.stop();}catch(e){} }
  recLive=false;
}
function recUI(){
  const b = document.getElementById("tRec"); if(!b) return;
  b.classList.toggle("rec", recLive); b.classList.toggle("pulse", recLive);
  b.innerHTML = (recLive?I.stop:I.wave)+'<span>'+(recLive?("إيقاف "+recSecs+" ث"):"تسجيل صوتي")+'</span>';
}

// ---------- الصور ----------
function compressImage(file, maxSide=1200, quality=0.75){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(Math.max(w,h)>maxSide){ const k=maxSide/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const cv = document.createElement("canvas");
        cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
document.getElementById("imgPick").addEventListener("change", async e=>{
  const files = Array.from(e.target.files||[]); e.target.value="";
  if(!files.length || !editing) return;
  if(editing.images.length + files.length > 8){ toast("الحد الأقصى ٨ صور لكل مذكرة"); return; }
  try{
    for(const f of files.slice(0,8)) editing.images.push(await compressImage(f));
    renderImages(); toast("أُرفقت الصور ✓");
  }catch(err){ toast("تعذّر قراءة الصورة"); }
});

// ---------- قفل يوم كامل ----------
async function lockDay(key){
  const targets = notes.filter(n=>!n.locked && dayKey(n.createdAt)===key);
  if(!targets.length) return;
  if(!(await askConfirm("قفل اليوم كاملاً","سيتم تشفير "+targets.length+" مذكرة من هذا اليوم بكلمة السر.","قفل الكل"))) return;
  const p = await ensurePass("أدخل كلمة السر لقفل اليوم");
  if(!p) return;
  for(const n of targets){
    const rec = await lockNoteRecord(n);
    rec.updatedAt = n.updatedAt; // نحافظ على الترتيب
    await dbPut(rec);
    const i = notes.findIndex(x=>x.id===n.id);
    notes[i] = rec;
    delete unlocked[n.id];
  }
  toast("قُفلت مذكرات اليوم 🔒");
  renderList();
}

// ---------- الإعدادات والنسخ الاحتياطي ----------
function openSettings(){
  const v = modal('<h3>الإعدادات</h3>'
    + '<p>بياناتك محفوظة محلياً على هذا الجهاز فقط. خذ نسخة احتياطية دورياً.</p>'
    + '<div class="settings-list">'
    + '<button class="settings-item" data-a="export">'+I.download+'<span>تصدير نسخة احتياطية<small>ملف واحد يحوي كل المذكرات والصور والتسجيلات (المقفلة تبقى مشفّرة داخله)</small></span></button>'
    + '<button class="settings-item" data-a="import">'+I.upload+'<span>استعادة من نسخة احتياطية<small>دمج ملف نسخة سابقة مع مذكراتك الحالية</small></span></button>'
    + '<button class="settings-item" data-a="pass">'+I.key+'<span>'+(sec?"تغيير كلمة السر":"إنشاء كلمة السر")+'<small>'+(sec?"يعاد تشفير كل المذكرات المقفلة بالكلمة الجديدة":"مطلوبة لقفل المذكرات والأيام")+'</small></span></button>'
    + '</div>'
    + '<div class="modal-btns" style="margin-top:14px"><button class="mbtn ghost" data-a="close">إغلاق</button></div>');
  v.querySelector('[data-a=close]').onclick = ()=>v.remove();
  v.querySelector('[data-a=export]').onclick = ()=>{ v.remove(); exportBackup(); };
  v.querySelector('[data-a=import]').onclick = ()=>{ v.remove(); document.getElementById("bakPick").click(); };
  v.querySelector('[data-a=pass]').onclick = async ()=>{ v.remove(); await changePassword(); };
}

async function exportBackup(){
  try{
    const payload = {
      app:"smart-notes-local", version:1, exportedAt:new Date().toISOString(),
      sec: sec || null,
      notes: await dbAllNotes(),
    };
    const blob = new Blob([JSON.stringify(payload)], {type:"application/json"});
    const a = document.createElement("a");
    const d = new Date();
    const name = "نسخة-مذكراتي-"+d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+".json";
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    toast("صُدّرت النسخة الاحتياطية ✓ ("+payload.notes.length+" مذكرة)");
  }catch(e){ toast("تعذّر التصدير"); }
}

document.getElementById("bakPick").addEventListener("change", async e=>{
  const f = e.target.files[0]; e.target.value="";
  if(!f) return;
  try{
    const data = JSON.parse(await f.text());
    if(data.app!=="smart-notes-local" || !Array.isArray(data.notes)) throw 0;
    let added=0, updated=0;
    for(const n of data.notes){
      if(!n || !n.id) continue;
      const cur = notes.find(x=>x.id===n.id);
      if(!cur){ await dbPut(n); notes.push(n); added++; }
      else if((n.updatedAt||0) > (cur.updatedAt||0)){ await dbPut(n); notes[notes.indexOf(cur)]=n; updated++; }
    }
    if(!sec && data.sec){ sec = data.sec; await metaSet("sec", sec); }
    notes.sort((a,b)=>b.updatedAt-a.updatedAt);
    toast("تمت الاستعادة ✓ أُضيفت "+added+" وحُدّثت "+updated);
    renderList();
  }catch(err){ toast("الملف ليس نسخة احتياطية صالحة"); }
});

async function changePassword(){
  if(!sec){ await ensurePass(); return; }
  // تحقق من الكلمة الحالية
  const old = await askPassword("أدخل كلمة السر الحالية");
  if(!old) return;
  const np = await askNewPassword();
  if(!np) return;
  // إعادة تشفير كل المذكرات المقفلة
  const lockedNotes = notes.filter(n=>n.locked);
  try{
    const newSalt = b64(crypto.getRandomValues(new Uint8Array(16)));
    for(const n of lockedNotes){
      const payload = await decObj(n.enc, old);
      n.enc = await encObj(payload, np, newSalt);
      await dbPut(n);
    }
    const verifier = await encObj({ok:1}, np, newSalt);
    sec = { salt:newSalt, verifier };
    await metaSet("sec", sec);
    sessionPass = np;
    toast("غُيّرت كلمة السر وأعيد تشفير "+lockedNotes.length+" مذكرة ✓");
  }catch(e){ toast("تعذّر تغيير كلمة السر — بعض المذكرات لم تُفتح بالكلمة القديمة"); }
}
