
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#5C4B63" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>مذكّراتي الذكية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Almarai:wght@300;400;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body{
  font-family:'Almarai',sans-serif;
  color:#3D3242;
  background:
    radial-gradient(circle at 15% 10%, rgba(233,196,106,.14), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(201,144,155,.14), transparent 45%),
    linear-gradient(180deg,#F6F1EA 0%, #F0E9E1 100%);
  min-height:100vh;
  overflow:hidden;
}
button{ font-family:inherit; cursor:pointer; }
input,textarea{ font-family:inherit; }
mark{ background:#F9E7B3; border-radius:3px; padding:0 2px; color:inherit; }

.app-container{ display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* ═══════════ الترويسة — تدرج بنفسجي وردي دافئ ═══════════ */
.header{
  background:linear-gradient(140deg,#4E3D57 0%, #7A5C77 48%, #B37E88 100%);
  color:#FFF7F0;
  padding:18px 18px 16px;
  border-radius:0 0 30px 30px;
  box-shadow:0 10px 30px rgba(78,61,87,.28);
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
/* زخرفة نجوم/نقاط خفيفة على الترويسة */
.header::before{
  content:'';
  position:absolute; inset:0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.16) 1.5px, transparent 2px),
    radial-gradient(circle, rgba(255,255,255,.09) 1px, transparent 1.5px);
  background-size:70px 70px, 34px 34px;
  background-position:0 0, 17px 22px;
  pointer-events:none;
}
.header > *{ position:relative; }
.header-content{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:13px; }
.brand-section h1{
  font-family:'Aref Ruqaa',serif;
  font-size:29px; font-weight:700; letter-spacing:.5px;
  text-shadow:0 2px 8px rgba(0,0,0,.18);
}
.brand-section p{ font-size:11.5px; color:#EBD3D6; font-weight:300; margin-top:5px; }
.header-btns{ display:flex; gap:8px; flex-shrink:0; }
.icon-btn{
  width:42px; height:42px; border-radius:13px;
  border:1px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.12);
  color:#FFF7F0; display:grid; place-items:center; transition:all .25s;
}
.icon-btn:active{ background:rgba(255,255,255,.24); transform:scale(.93); }
.icon-btn svg{ width:18px; height:18px; }

.search-container{
  display:flex; align-items:center; gap:10px;
  background:#FFFDF9; border-radius:16px; padding:10px 14px;
  box-shadow:0 5px 18px rgba(61,45,66,.18);
}
.search-container.listening{ box-shadow:0 0 0 3px rgba(233,196,106,.55); }
.search-container input{
  flex:1; border:none; outline:none; font-size:14.5px;
  background:transparent; color:#3D3242; min-width:0;
}
.search-container input::placeholder{ color:#A99AAB; }
.mic-search{
  width:35px; height:35px; border-radius:11px; border:none;
  background:linear-gradient(135deg,#4E3D57,#7A5C77);
  color:#FFF7F0; display:grid; place-items:center; flex-shrink:0; transition:all .25s;
}
.mic-search:active{ transform:scale(.9); }
.mic-search.live{ background:linear-gradient(135deg,#E9C46A,#E0A868); color:#4E3D57; }
.mic-search svg{ width:16px; height:16px; }
.clear-q{ border:none; background:transparent; color:#A99AAB; padding:4px; display:grid; place-items:center; }
.clear-q svg{ width:14px; height:14px; }

.color-palette{ display:flex; gap:9px; overflow-x:auto; margin-top:12px; padding:4px 2px 6px; align-items:center; }
.color-btn{
  width:30px; height:30px; border-radius:50%;
  border:2px solid rgba(255,255,255,.55); flex-shrink:0;
  transition:transform .2s; box-shadow:0 2px 6px rgba(0,0,0,.18);
}
.color-btn:active{ transform:scale(1.12); }
.color-btn.selected{ outline:2.5px solid #FFF7F0; outline-offset:2px; }
.chip-all{
  border-radius:999px; border:1.5px solid rgba(255,255,255,.5);
  background:transparent; color:#FFF7F0; font-size:11.5px; font-weight:700;
  padding:6px 15px; flex-shrink:0;
}
.chip-all.selected{ background:#FFF7F0; color:#4E3D57; }

/* ═══════════ القائمة ═══════════ */
.main{ flex:1; overflow-y:auto; overflow-x:hidden; padding:18px 16px 120px; }
.main::-webkit-scrollbar{ width:5px; }
.main::-webkit-scrollbar-thumb{ background:#C9A0A8; border-radius:3px; }

.day-section{ margin-bottom:26px; }
.day-header{ display:flex; align-items:center; gap:10px; margin-bottom:16px; padding:0 4px; }
.day-title{
  font-size:13.5px; font-weight:700; color:#5C4B63;
  font-family:'Cairo',sans-serif; white-space:nowrap;
  background:#FFFDF9; border:1px solid #E5D8CD; border-radius:999px;
  padding:5px 14px; box-shadow:0 2px 6px rgba(92,75,99,.08);
}
.day-line{ flex:1; height:0; border-top:2px dashed #D8C6BC; }
.lock-day-btn{
  font-size:10.5px; font-weight:700;
  border:1px solid #C9A0A8; background:#FFF6F2; color:#8A5A64;
  border-radius:999px; padding:5px 11px; white-space:nowrap;
  display:flex; align-items:center; gap:4px; transition:all .2s;
}
.lock-day-btn:active{ transform:scale(.93); }
.lock-day-btn svg{ width:11px; height:11px; }

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(100%,168px),1fr));
  gap:18px 14px;
  padding-top:10px;
}

/* ═══════════ البطاقة = ورقة مذكرة واقعية ═══════════ */
.card{
  position:relative;
  border-radius:3px 3px 12px 12px;
  padding:18px 15px 12px;
  cursor:pointer;
  display:flex; flex-direction:column; gap:8px;
  border:1px solid;
  box-shadow:
    0 1px 2px rgba(61,50,66,.08),
    0 7px 16px rgba(61,50,66,.13),
    inset 0 0 40px rgba(255,255,255,.35);
  transition:transform .25s, box-shadow .25s;
  /* الأسطر المسطّرة */
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 25px,
    var(--rule) 25px, var(--rule) 26px
  );
  background-position:0 14px;
}
/* ميلان خفيف متبادل مثل أوراق ملصوقة */
.cards-grid .card:nth-child(odd){ transform:rotate(.7deg); }
.cards-grid .card:nth-child(even){ transform:rotate(-.6deg); }
.cards-grid .card:nth-child(3n){ transform:rotate(.3deg); }
.card:active{ transform:scale(.97) rotate(0deg) !important; box-shadow:0 3px 10px rgba(61,50,66,.15); }

/* شريط لاصق أعلى الورقة */
.card::before{
  content:'';
  position:absolute; top:-9px; right:50%;
  transform:translateX(50%) rotate(-2.5deg);
  width:62px; height:19px;
  background:linear-gradient(rgba(255,251,235,.85), rgba(240,230,205,.7));
  border-left:1px dashed rgba(0,0,0,.07);
  border-right:1px dashed rgba(0,0,0,.07);
  box-shadow:0 2px 4px rgba(0,0,0,.1);
  opacity:.95;
}
/* خط الهامش الأحمر على يمين الورقة */
.card::after{
  content:'';
  position:absolute; top:0; bottom:0; right:26px;
  width:1.5px; background:rgba(209,106,106,.4);
  pointer-events:none;
}

.card-locked{ justify-content:center; align-items:center; min-height:130px; text-align:center; gap:6px; }
.card-locked .lock-icon{ font-size:30px; filter:drop-shadow(0 2px 3px rgba(0,0,0,.15)); }
.card-locked .lock-text{ font-size:12.5px; font-weight:700; font-family:'Cairo',sans-serif; }
.card-locked .lock-time{ font-size:10px; opacity:.55; }

.card-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.card-title{
  font-size:14.5px; font-weight:700; line-height:26px;
  font-family:'Cairo',sans-serif; word-break:break-word; flex:1;
}
.card-title.empty{ opacity:.4; font-weight:400; }
.pin-icon{
  border:none; background:transparent; color:rgba(0,0,0,.18);
  width:24px; height:24px; display:grid; place-items:center; flex-shrink:0; transition:all .2s;
}
.pin-icon.pinned{ color:#D1656F; transform:rotate(-20deg); }
.pin-icon svg{ width:16px; height:16px; }
.card-preview{
  font-size:12.5px; line-height:26px; opacity:.8; font-weight:300;
  word-break:break-word; white-space:pre-wrap;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.card-thumbs{ display:flex; gap:6px; align-items:center; }
.card-thumb{
  width:46px; height:46px; border-radius:4px; object-fit:cover;
  border:3px solid #FFFDF9; box-shadow:0 2px 6px rgba(0,0,0,.18);
  transform:rotate(-2deg); flex-shrink:0;
}
.card-thumb:nth-child(even){ transform:rotate(2deg); }
.card-more-thumbs{ font-size:11px; font-weight:700; opacity:.55; }
.card-footer{ display:flex; justify-content:space-between; align-items:center; }
.card-meta{ display:flex; gap:6px; align-items:center; font-size:10px; opacity:.6; font-weight:300; }
.card-badge{
  display:inline-flex; align-items:center; gap:2px;
  background:rgba(0,0,0,.06); border-radius:6px; padding:2px 6px;
  font-size:9px; font-weight:700;
}
.card-badge svg{ width:10px; height:10px; }
.card-delete{
  border:none; background:transparent; color:rgba(0,0,0,.22);
  padding:4px; display:grid; place-items:center; transition:all .2s;
}
.card-delete:active{ color:#C0392B; transform:scale(.85); }
.card-delete svg{ width:14px; height:14px; }
.card-tags{ display:flex; gap:5px; flex-wrap:wrap; }
.card-tag{
  font-size:9.5px; font-weight:700; border:1px solid;
  border-radius:999px; padding:2px 8px; background:rgba(255,253,249,.8);
}

.empty-state{ text-align:center; padding:60px 22px; display:flex; flex-direction:column; align-items:center; gap:12px; }
.empty-icon{ font-size:58px; animation:float 3s ease-in-out infinite; filter:drop-shadow(0 6px 8px rgba(92,75,99,.2)); }
@keyframes float{ 0%,100%{ transform:translateY(0) rotate(-3deg);} 50%{ transform:translateY(-9px) rotate(3deg);} }
.empty-title{ font-size:20px; font-weight:700; font-family:'Aref Ruqaa',serif; color:#5C4B63; }
.empty-text{ font-size:13px; color:#8E7B8E; line-height:1.9; }
.empty-btn{
  margin-top:10px; display:inline-flex; align-items:center; gap:8px;
  background:linear-gradient(135deg,#4E3D57,#7A5C77);
  color:#FFF7F0; border:none; border-radius:15px; padding:13px 26px;
  font-size:14px; font-weight:700; box-shadow:0 6px 16px rgba(78,61,87,.3);
  transition:all .25s;
}
.empty-btn:active{ transform:scale(.94); }
.empty-btn svg{ width:16px; height:16px; }

/* ═══════════ الزر العائم — ريشة كتابة ═══════════ */
.fab{
  position:fixed; bottom:26px; left:20px;
  width:60px; height:60px; border-radius:50% 50% 50% 12px;
  border:none;
  background:linear-gradient(135deg,#E9C46A 0%,#D98E73 100%);
  color:#4E3D57;
  box-shadow:0 10px 26px rgba(217,142,115,.5);
  display:grid; place-items:center; z-index:30; transition:all .25s;
}
.fab:active{ transform:scale(.9) rotate(-8deg); }
.fab svg{ width:25px; height:25px; }

/* ═══════════ المحرر — دفتر حقيقي ═══════════ */
.editor-screen{
  position:fixed; inset:0; z-index:60;
  display:flex; flex-direction:column;
  overflow:hidden;
  animation:slideIn .28s ease-out;
}
@keyframes slideIn{ from{ transform:translateY(28px); opacity:0;} to{ transform:translateY(0); opacity:1;} }

.editor-header{
  border-bottom:1.5px solid;
  padding:12px 14px;
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  flex-shrink:0; backdrop-filter:blur(10px);
}
.editor-back{
  border:none; background:rgba(0,0,0,.07); border-radius:11px;
  width:39px; height:39px; display:grid; place-items:center;
  color:inherit; flex-shrink:0; transition:all .2s;
}
.editor-back:active{ background:rgba(0,0,0,.14); transform:scale(.92); }
.editor-back svg{ width:18px; height:18px; }
.editor-time{ font-size:11.5px; opacity:.6; white-space:nowrap; }
.editor-actions{ display:flex; gap:6px; flex-shrink:0; }

.editor-content{ flex:1; overflow-y:auto; padding:14px 14px 150px; }

/* ورقة الدفتر داخل المحرر */
.sheet{
  position:relative;
  background-color:var(--paper);
  border:1px solid var(--paper-edge);
  border-radius:4px 4px 14px 14px;
  padding:20px 40px 24px 18px;
  box-shadow:
    0 1px 2px rgba(61,50,66,.08),
    0 10px 24px rgba(61,50,66,.14),
    inset 0 0 60px rgba(255,255,255,.4);
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0 31px,
    var(--rule) 31px 32px
  );
  background-position:0 10px;
}
/* ثقوب الدفتر على اليمين */
.sheet .holes{
  position:absolute; top:24px; bottom:24px; right:9px; width:14px;
  background-image:radial-gradient(circle 5px at center, rgba(61,50,66,.14) 4.4px, rgba(255,255,255,.9) 4.6px, transparent 6px);
  background-size:14px 46px;
  background-repeat:repeat-y;
  pointer-events:none;
}
/* خط الهامش */
.sheet::after{
  content:''; position:absolute; top:0; bottom:0; right:32px;
  width:1.5px; background:rgba(209,106,106,.4); pointer-events:none;
}
.editor-title{
  width:100%; border:none; outline:none; background:transparent;
  font-size:23px; font-weight:700; color:inherit;
  font-family:'Cairo',sans-serif; line-height:32px; margin-bottom:0;
}
.editor-text{
  width:100%; border:none; outline:none; background:transparent;
  font-size:15px; line-height:32px; resize:none; min-height:260px;
  color:inherit; font-weight:300; overflow:hidden;
}

.color-picker-row{ display:flex; gap:9px; margin-bottom:14px; overflow-x:auto; padding:4px 2px; }
.color-pick{
  width:30px; height:30px; border-radius:50%;
  border:2px solid rgba(255,255,255,.9); flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.15); transition:transform .2s;
}
.color-pick:active{ transform:scale(1.15); }
.color-pick.selected{ outline:2.5px solid #5C4B63; outline-offset:2px; }

.editor-section{ margin-top:20px; }
.editor-section h4{
  display:flex; align-items:center; gap:7px;
  font-size:13px; font-weight:700; margin-bottom:10px; opacity:.85;
  font-family:'Cairo',sans-serif;
}
.editor-section h4 svg{ width:15px; height:15px; }

.audio-item{
  display:flex; align-items:center; gap:8px;
  border:1.5px solid; border-radius:13px; padding:8px 10px; margin-bottom:9px;
  background:rgba(255,253,249,.75); box-shadow:0 2px 8px rgba(61,50,66,.06);
}
.audio-item audio{ flex:1; height:38px; max-width:100%; min-width:0; border-radius:9px; }
.audio-del{ border:none; background:transparent; color:#B0616B; padding:4px; display:grid; place-items:center; flex-shrink:0; }
.audio-del svg{ width:13px; height:13px; }

.image-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(115px,1fr)); gap:14px; }
.image-item{ position:relative; }
.image-item img{
  width:100%; height:118px; object-fit:cover; display:block; cursor:zoom-in;
  border:5px solid #FFFDF9; border-bottom-width:16px;
  box-shadow:0 4px 10px rgba(61,50,66,.2);
  transform:rotate(-1.5deg); transition:transform .2s;
}
.image-item:nth-child(even) img{ transform:rotate(1.5deg); }
.image-item img:active{ transform:rotate(0) scale(1.03); }
.image-delete{
  position:absolute; top:2px; left:2px; width:26px; height:26px;
  border-radius:8px; border:none; background:rgba(61,50,66,.65);
  color:#FFF; display:grid; place-items:center;
}
.image-delete svg{ width:12px; height:12px; }

.tags-container{ display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
.tag-item{
  display:inline-flex; align-items:center; font-size:12px; font-weight:700;
  border:1.5px solid; border-radius:999px; padding:4px 11px;
  background:rgba(255,253,249,.8);
}
.tag-remove{ border:none; background:transparent; color:inherit; padding:0 3px; margin-right:4px; opacity:.6; display:grid; place-items:center; }
.tag-remove svg{ width:10px; height:10px; }
.tag-input{
  border:1.5px dashed; border-radius:999px; padding:5px 13px;
  font-size:12px; background:transparent; outline:none; width:115px; color:inherit;
}

.lock-state{
  display:inline-flex; align-items:center; gap:7px;
  font-size:12px; font-weight:700; border:1.5px dashed;
  border-radius:999px; padding:7px 14px;
  background:rgba(255,253,249,.75); color:inherit;
  font-family:'Cairo',sans-serif; margin-bottom:14px;
}

/* ═══════════ شريط الأدوات ═══════════ */
.tool-bar{
  position:fixed; bottom:0; left:0; right:0; z-index:70;
  display:flex; gap:8px;
  padding:11px 12px calc(11px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg, rgba(78,61,87,.96), rgba(61,48,68,.99));
  backdrop-filter:blur(12px);
  justify-content:center; flex-wrap:wrap;
  border-top:1px solid rgba(255,255,255,.12);
  border-radius:22px 22px 0 0;
}
.tool-btn{
  display:inline-flex; align-items:center; gap:7px;
  border:none; background:rgba(255,255,255,.12); color:#FFF7F0;
  border-radius:13px; padding:11px 14px;
  font-size:12px; font-weight:700; transition:all .2s;
}
.tool-btn:active{ transform:scale(.93); }
.tool-btn svg{ width:17px; height:17px; }
.tool-btn.live{ background:linear-gradient(135deg,#E9C46A,#E0A868); color:#4E3D57; }
.tool-btn.rec{ background:linear-gradient(135deg,#D1656F,#B0616B); color:#FFF; }
.tool-btn.save{ background:linear-gradient(135deg,#8FA98B,#6E9180); color:#FFF; }

/* ═══════════ النوافذ ═══════════ */
.modal-veil{
  position:fixed; inset:0; background:rgba(48,38,53,.6);
  z-index:200; display:grid; place-items:center; padding:20px;
  backdrop-filter:blur(5px);
}
.modal{
  background:linear-gradient(160deg,#FFFDF9,#F8F2EA);
  border-radius:22px; padding:26px 22px; width:100%; max-width:380px;
  box-shadow:0 18px 50px rgba(0,0,0,.3);
  border:1px solid #E8DCCF;
  animation:slideIn .25s ease-out;
}
.modal h3{ font-size:17px; font-weight:700; color:#4E3D57; font-family:'Cairo',sans-serif; margin-bottom:8px; }
.modal p{ font-size:13px; color:#8E7B8E; line-height:1.85; font-weight:300; margin-bottom:14px; }
.modal input{
  width:100%; border:1.5px solid #D8C6BC; border-radius:12px;
  padding:12px 14px; font-size:15px; outline:none; margin-bottom:10px;
  background:#FFF; color:#3D3242; transition:all .2s;
}
.modal input:focus{ border-color:#B37E88; box-shadow:0 0 0 3px rgba(179,126,136,.15); }
.modal-buttons{ display:flex; gap:9px; margin-top:6px; }
.modal-btn{
  flex:1; border:none; border-radius:12px; padding:12px;
  font-size:13.5px; font-weight:700; transition:all .2s;
  font-family:'Cairo',sans-serif;
}
.modal-btn:active{ transform:scale(.95); }
.modal-btn.primary{ background:linear-gradient(135deg,#4E3D57,#7A5C77); color:#FFF7F0; }
.modal-btn.ghost{ background:#EFE6DC; color:#4E3D57; }
.modal-btn.danger{ background:#FBE9E7; color:#B0432F; }
.modal .error{ color:#B0432F; font-size:12px; margin:-4px 0 10px; display:none; font-weight:700; }

.toast{
  position:fixed; bottom:92px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg,#4E3D57,#7A5C77);
  color:#FFF7F0; padding:11px 22px; border-radius:14px;
  font-size:13px; box-shadow:0 8px 22px rgba(78,61,87,.35);
  z-index:300; max-width:85vw; text-align:center;
  animation:toastIn .3s ease-out;
}
@keyframes toastIn{ from{ transform:translateX(-50%) translateY(16px); opacity:0;} to{ transform:translateX(-50%) translateY(0); opacity:1;} }

.lightbox{
  position:fixed; inset:0; background:rgba(30,24,34,.95);
  z-index:250; display:grid; place-items:center; cursor:zoom-out; padding:20px;
}
.lightbox img{ max-width:95vw; max-height:88vh; border:8px solid #FFFDF9; box-shadow:0 12px 44px rgba(0,0,0,.55); }

.pulse{ animation:pulseAnim 1.2s ease-in-out infinite; }
@keyframes pulseAnim{ 0%,100%{ box-shadow:0 0 0 0 rgba(233,196,106,.55);} 50%{ box-shadow:0 0 0 9px rgba(233,196,106,0);} }

const esc = s => String(s??"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

function normalizeAr(s=""){
  return s.toLowerCase().replace(/[\u064B-\u065F\u0670]/g,"").replace(/[أإآٱ]/g,"ا").replace(/ة/g,"ه").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/\s+/g," ").trim();
}
const DAY_NAMES = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
function dayKey(ts){ return new Date(ts).toDateString(); }
function dayLabel(ts){
  const d=new Date(ts), t=new Date(), y=new Date(); y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString()) return "اليوم ✨";
  if(d.toDateString()===y.toDateString()) return "أمس";
  return DAY_NAMES[d.getDay()]+" "+d.toLocaleDateString("ar-EG",{day:"numeric",month:"long",year:"numeric"});
}
function timeLabel(ts){ return new Date(ts).toLocaleTimeString("ar-EG",{hour:"numeric",minute:"2-digit"}); }

  key:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="4.5"/><path d="m11 12 9-9"/><path d="m17 6 3 3"/><path d="m14 9 2 2"/></svg>',

/* ─────────── IndexedDB ─────────── */
let _db = null;
function openDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r = indexedDB.open("smart-notes-local", 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains("notes")) d.createObjectStore("notes",{keyPath:"id"});
      if(!d.objectStoreNames.contains("meta"))  d.createObjectStore("meta",{keyPath:"k"});
    };
    r.onsuccess = ()=>{ _db=r.result; res(_db); };
    r.onerror = ()=>rej(r.error);
  });
}
function tx(store, mode, fn){
  return openDB().then(db => new Promise((res,rej)=>{
    const t = db.transaction(store, mode);
    const out = fn(t.objectStore(store));
    t.oncomplete = ()=>res(out && out.result !== undefined ? out.result : undefined);
    t.onerror = ()=>rej(t.error);
  }));
}
const dbAllNotes = ()=>openDB().then(db=>new Promise((res,rej)=>{
  const q = db.transaction("notes").objectStore("notes").getAll();
  q.onsuccess=()=>res(q.result||[]); q.onerror=()=>rej(q.error);
}));
const dbPut = n => tx("notes","readwrite", s=>s.put(n));
const dbDel = id => tx("notes","readwrite", s=>s.delete(id));
const metaGet = k => openDB().then(db=>new Promise((res,rej)=>{
  const q = db.transaction("meta").objectStore("meta").get(k);
  q.onsuccess=()=>res(q.result ? q.result.v : null); q.onerror=()=>rej(q.error);
}));
const metaSet = (k,v)=>tx("meta","readwrite", s=>s.put({k,v}));

/* ─────────── التشفير AES-256 ─────────── */
const b64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const unb64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function deriveKey(pass, saltB64){
  const mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:unb64(saltB64), iterations:210000, hash:"SHA-256"}, mat, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function encObj(obj, pass, saltB64){
  const key = await deriveKey(pass, saltB64);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
  return { salt:saltB64, iv:b64(iv), ct:b64(ct) };
}
async function decObj(pack, pass){
  const key = await deriveKey(pass, pack.salt);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:unb64(pack.iv)}, key, unb64(pack.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ─────────── الحالة ─────────── */
let notes = [];
let sec = null;
let sessionPass = null;
let unlocked = {};
let query = "", colorFilter = null;
let editing = null;
const app = document.getElementById("app");
const editors = document.getElementById("editors");

let toastT = null;
function toast(msg){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const el = document.createElement("div");
  el.className = "toast"; el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastT); toastT = setTimeout(()=>el.remove(), 2600);
}

function modal(html){
  const veil = document.createElement("div");
  veil.className = "modal-veil";
  veil.innerHTML = '<div class="modal">'+html+'</div>';
  document.body.appendChild(veil);
  veil.addEventListener("click", e=>{ if(e.target===veil) veil.remove(); });
  return veil;
}
function askConfirm(title, text, okLabel, danger){
  return new Promise(res=>{
    const v = modal('<h3>'+esc(title)+'</h3>'+(text?'<p>'+esc(text)+'</p>':'')+'<div class="modal-buttons"><button class="modal-btn ghost" data-a="no">إلغاء</button><button class="modal-btn '+(danger?"danger":"primary")+'" data-a="yes">'+esc(okLabel||"تأكيد")+'</button></div>');
    v.querySelector('[data-a=no]').onclick = ()=>{ v.remove(); res(false); };
    v.querySelector('[data-a=yes]').onclick = ()=>{ v.remove(); res(true); };
  });
}
function askNewPassword(){
  return new Promise(res=>{
    const v = modal('<h3>🔑 إنشاء كلمة السر</h3><p>ستُشفَّر بها مذكراتك المقفلة. <b>لا يمكن استعادتها إن نُسيت</b> — احفظها جيداً.</p><input type="password" id="p1" placeholder="كلمة السر (٤ أحرف فأكثر)" /><input type="password" id="p2" placeholder="تأكيد كلمة السر" /><div class="error" id="perr"></div><div class="modal-buttons"><button class="modal-btn ghost" data-a="no">إلغاء</button><button class="modal-btn primary" data-a="yes">حفظ</button></div>');
    const err = v.querySelector("#perr");
    v.querySelector('[data-a=no]').onclick = ()=>{ v.remove(); res(null); };
    v.querySelector('[data-a=yes]').onclick = ()=>{
      const a = v.querySelector("#p1").value, b = v.querySelector("#p2").value;
      if(a.length<4){ err.textContent="كلمة السر قصيرة جداً"; err.style.display="block"; return; }
      if(a!==b){ err.textContent="الكلمتان غير متطابقتين"; err.style.display="block"; return; }
      v.remove(); res(a);
    };
    setTimeout(()=>v.querySelector("#p1").focus(), 60);
  });
}
function askPassword(title){
  return new Promise(res=>{
    const v = modal('<h3>🔒 '+esc(title||"أدخل كلمة السر")+'</h3><input type="password" id="pp" placeholder="كلمة السر" /><div class="error" id="perr">كلمة السر غير صحيحة</div><div class="modal-buttons"><button class="modal-btn ghost" data-a="no">إلغاء</button><button class="modal-btn primary" data-a="yes">فتح</button></div>');
    const inp = v.querySelector("#pp"), err = v.querySelector("#perr");
    const submit = async ()=>{
      const p = inp.value; if(!p) return;
      try{ await decObj(sec.verifier, p); sessionPass = p; v.remove(); res(p); }
      catch(e){ err.style.display="block"; inp.select(); }
    };
    v.querySelector('[data-a=no]').onclick = ()=>{ v.remove(); res(null); };
    v.querySelector('[data-a=yes]').onclick = submit;
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
    setTimeout(()=>inp.focus(), 60);
  });
}
async function ensurePass(reason){
  if(sessionPass) return sessionPass;
  if(!sec){
    const p = await askNewPassword();
    if(!p) return null;
    const salt = b64(crypto.getRandomValues(new Uint8Array(16)));
    const verifier = await encObj({ok:1}, p, salt);
    sec = { salt, verifier };
    await metaSet("sec", sec);
    sessionPass = p;
    toast("أُنشئت كلمة السر ✓");
    return p;
  }
  return await askPassword(reason);
}
async function lockNoteRecord(n){
  const payload = { title:n.title, text:n.text, tags:n.tags||[], images:n.images||[], audios:n.audios||[] };
  const enc = await encObj(payload, sessionPass, sec.salt);
  return { id:n.id, locked:true, enc, color:n.color, pinned:!!n.pinned, createdAt:n.createdAt, updatedAt:Date.now() };
}
async function unlockToMemory(n){
  if(unlocked[n.id]) return unlocked[n.id];
  if(!sessionPass){ const p = await ensurePass("أدخل كلمة السر لفتح المذكرة"); if(!p) return null; }
  try{ const payload = await decObj(n.enc, sessionPass); unlocked[n.id] = payload; return payload; }
  catch(e){ toast("كلمة السر لا تفتح هذه المذكرة"); return null; }
}

async function boot(){
  try{
    sec = await metaGet("sec");
    notes = await dbAllNotes();
    notes.sort((a,b)=>b.updatedAt-a.updatedAt);
  }catch(e){
    app.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p class="empty-text">تعذّر فتح قاعدة البيانات — لا تستخدم التصفح الخفي</p></div>';
    return;
  }
  renderList();
}

/* ─────────── شاشة القائمة ─────────── */
function renderList(){
  editing = null;
  editors.innerHTML = "";
  const week = Date.now()-7*864e5;
  const total = notes.length;
  const weekCount = notes.filter(n=>n.createdAt>week).length;
  const lockedCount = notes.filter(n=>n.locked).length;

  let list = notes.slice();
  if(colorFilter) list = list.filter(n=>n.color===colorFilter);
  const q = normalizeAr(query);
  if(q){
    const terms = q.split(" ").filter(Boolean);
    list = list.filter(n=>{
      const c = n.locked ? unlocked[n.id] : n;
      if(!c) return false;
      const hay = normalizeAr((c.title||"")+" "+(c.text||"")+" "+(c.tags||[]).join(" "));
      return terms.every(t=>hay.includes(t));
    });
  }
  const pinned = list.filter(n=>n.pinned);
  const rest = list.filter(n=>!n.pinned);
  const groups = new Map();
  for(const n of rest){
    const k = dayKey(n.createdAt);
    if(!groups.has(k)) groups.set(k, {label:dayLabel(n.createdAt), items:[]});
    groups.get(k).items.push(n);
  }

  let h = '<div class="header">'
    + '<div class="header-content"><div class="brand-section"><h1>مذكّراتي ✍️</h1><p>'+total+' مذكرة · '+weekCount+' هذا الأسبوع'+(lockedCount?' · '+lockedCount+' مقفلة 🔒':'')+'</p></div>'
    + '<div class="header-btns"><button class="icon-btn" id="btnSettings" aria-label="الإعدادات">'+I.gear+'</button></div></div>'
    + '<div class="search-container" id="searchbar"><span style="color:#A99AAB;display:grid;width:17px;height:17px">'+I.search+'</span>'
    + '<input id="searchInput" placeholder="ابحث بالكتابة أو بصوتك…" value="'+esc(query)+'" />'
    + (query?'<button class="clear-q" id="clearQ" aria-label="مسح">'+I.x+'</button>':'')
    + '<button class="mic-search" id="voiceSearch" aria-label="بحث صوتي">'+I.mic+'</button></div>'
    + '<div class="color-palette">'
    + '<button class="chip-all'+(!colorFilter?' selected':'')+'" id="chipAll">الكل</button>'
    + PAGE_COLORS.map(c=>'<button class="color-btn'+(colorFilter===c.id?' selected':'')+'" data-cf="'+c.id+'" title="'+c.name+'" aria-label="'+c.name+'" style="background:'+c.bg+'"></button>').join("")
    + '</div></div>';

  h += '<div style="padding-top:6px">';
  if(total===0){
    h += '<div class="empty-state"><div class="empty-icon">📔</div><h2 class="empty-title">دفترك الجديد بانتظارك</h2><p class="empty-text">اكتب أو أملِ بصوتك أو سجّل رسالة صوتية،<br>وكل شيء يبقى على جهازك فقط 🔐</p><button class="empty-btn" id="emptyNew">✍️ أول مذكرة</button></div>';
  } else if(list.length===0){
    h += '<div class="empty-state"><div class="empty-icon">🔍</div><p class="empty-text">لا نتائج مطابقة'+(lockedCount&&q?'<br><small>المقفلة لا تظهر في البحث قبل فتحها</small>':'')+'</p></div>';
  }

  const cardHTML = n => {
    const c = colorOf(n.color);
    const styleBase = 'background-color:'+c.bg+';border-color:'+c.edge+';color:'+c.ink+';--rule:'+c.rule;
    if(n.locked && !unlocked[n.id]){
      return '<article class="card" data-open="'+n.id+'" style="'+styleBase+'"><div class="card-locked"><div class="lock-icon">🔒</div><div class="lock-text">مذكرة مقفلة</div><div class="lock-time">'+timeLabel(n.createdAt)+' · اضغط لفتحها</div></div></article>';
    }
    const cc = n.locked ? unlocked[n.id] : n;
    const preview = (cc.text||"").slice(0,120);
    const hl = txt => {
      if(!q || !txt) return esc(txt);
      const term = q.split(" ")[0];
      const i = normalizeAr(txt).indexOf(term);
      if(i<0) return esc(txt);
      return esc(txt.slice(0,i))+'<mark>'+esc(txt.slice(i,i+term.length))+'</mark>'+esc(txt.slice(i+term.length));
    };

      + '<div class="card-header"><h3 class="card-title'+(cc.title?'':' empty')+'">'+(cc.title?hl(cc.title):'بدون عنوان')+(n.locked?' <span style="font-size:11px">🔒</span>':'')+'</h3>'
      + '<button class="pin-icon'+(n.pinned?' pinned':'')+'" data-pin="'+n.id+'" aria-label="تثبيت">'+I.pin+'</button></div>';
    if(preview) s += '<p class="card-preview">'+hl(preview)+(cc.text.length>120?"…":"")+'</p>';

      s += '<div class="card-thumbs">'+cc.images.slice(0,2).map(src=>'<img src="'+src+'" alt="" class="card-thumb" />').join("")
        + (cc.images.length>2?'<span class="card-more-thumbs">+'+(cc.images.length-2)+'</span>':'')+'</div>';
    }
    s += '<div class="card-footer"><span class="card-meta">'+timeLabel(n.createdAt)
      + (cc.audios&&cc.audios.length?'<span class="card-badge">'+I.wave+' '+cc.audios.length+'</span>':'')
      + (cc.images&&cc.images.length?'<span class="card-badge">'+I.image+' '+cc.images.length+'</span>':'')
      + '</span><button class="card-delete" data-del="'+n.id+'" aria-label="حذف">'+I.trash+'</button></div>';
    if(cc.tags && cc.tags.length) s += '<div class="card-tags">'+cc.tags.map(t=>'<span class="card-tag" style="border-color:'+c.edge+'">#'+esc(t)+'</span>').join("")+'</div>';
    return s+'</article>';
  };

  if(pinned.length){
    h += '<div class="day-section"><div class="day-header"><div class="day-title">📌 المثبّتة</div><div class="day-line"></div></div><div class="cards-grid">'+pinned.map(cardHTML).join("")+'</div></div>';

      + '</div><div class="cards-grid">'+g.items.map(cardHTML).join("")+'</div></div>';

  h += '</div>';
  app.innerHTML = h;

  const si = document.getElementById("searchInput");

async function openNote(id){
  const n = notes.find(x=>x.id===id); if(!n) return;
  if(n.locked){
    const payload = await unlockToMemory(n);
    if(!payload) return;
    editing = { id:n.id, color:n.color, pinned:n.pinned, createdAt:n.createdAt, updatedAt:n.updatedAt,
                title:payload.title||"", text:payload.text||"", tags:(payload.tags||[]).slice(),
                images:(payload.images||[]).slice(), audios:(payload.audios||[]).slice(), locked:true };
  } else {
    editing = JSON.parse(JSON.stringify(n));
    editing.locked = false;
  }
  renderEditor();
}
function newNote(){
  editing = {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    title:"", text:"", color:"cream", tags:[], images:[], audios:[],
    pinned:false, locked:false, createdAt:Date.now(), updatedAt:Date.now(),
  };
  renderEditor();
}

async function saveEditing(goBack){
  const n = editing;
  if(!n) { if(goBack) renderList(); return; }
  if(!n.title.trim() && !n.text.trim() && !n.images.length && !n.audios.length){
    if(goBack) renderList();
    return;
  }
  let record;
  if(n.locked){
    if(!sessionPass){ const p = await ensurePass(); if(!p){ toast("أدخل كلمة السر أولاً"); return; } }
    record = await lockNoteRecord(n);
    unlocked[n.id] = { title:n.title, text:n.text, tags:n.tags, images:n.images, audios:n.audios };
  } else {
    record = { id:n.id, locked:false, title:n.title, text:n.text, color:n.color, tags:n.tags,
               images:n.images, audios:n.audios, pinned:n.pinned, createdAt:n.createdAt, updatedAt:Date.now() };
    delete unlocked[n.id];
  }
  try{ await dbPut(record); }
  catch(e){ toast("تعذّر الحفظ — المساحة ممتلئة؟"); return; }
  notes = notes.filter(x=>x.id!==n.id);
  notes.unshift(record);
  notes.sort((a,b)=>b.updatedAt-a.updatedAt);
  toast("حُفظت على جهازك ✓");
  if(goBack) renderList();
}

/* ─────────── الإملاء الصوتي (بدون تكرار الكلمات) ─────────── */
function toggleDictation(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("الإملاء غير مدعوم في هذا المتصفح"); return; }
  if(dictLive){ stopDictation(); return; }
  dictRec = new SR();
  dictRec.lang="ar-SA"; dictRec.continuous=true; dictRec.interimResults=true;
  baseText = editing.text ? editing.text.replace(/\s*$/,"")+" " : "";
  let finalText = "";
  dictRec.onresult = e=>{
    finalText = "";
    let interim = "";
    for(let i=0; i<e.results.length; i++){
      if(e.results[i].isFinal) finalText += e.results[i][0].transcript + " ";
      else interim = e.results[i][0].transcript;
    }
    editing.text = (baseText + finalText + interim).replace(/\s+/g," ");
    const fX = document.getElementById("fText");
    if(fX){ fX.value = editing.text; autoGrow(fX); fX.scrollTop = fX.scrollHeight; }
  };
  dictRec.onend = ()=>{
    /* نثبت النص النهائي فقط عند التوقف */
    editing.text = (baseText + finalText).trim();
    const fX = document.getElementById("fText");
    if(fX){ fX.value = editing.text; autoGrow(fX); }
    dictLive=false; dictUI();
  };
  dictRec.onerror = e=>{ dictLive=false; dictUI(); if(e.error==="not-allowed") toast("اسمح بالوصول للميكروفون"); };
  dictLive = true; dictUI(); dictRec.start();
  toast("🎙️ أنا أستمع… تحدّث الآن");
}
function stopDictation(){ if(dictRec){ try{dictRec.stop();}catch(e){} } dictLive=false; dictUI(); }
function dictUI(){
  const b = document.getElementById("tDict"); if(!b) return;
  b.classList.toggle("live", dictLive); b.classList.toggle("pulse", dictLive);
  b.innerHTML = (dictLive?I.stop:I.mic)+'<span>'+(dictLive?"إيقاف":"إملاء")+'</span>';
}

/* ─────────── التسجيل الصوتي ─────────── */
async function toggleRecorder(){
  if(recLive){ try{mediaRec.stop();}catch(e){} return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRec = new MediaRecorder(stream);
    recChunks = []; recSecs = 0;
    mediaRec.ondataavailable = e=>{ if(e.data.size) recChunks.push(e.data); };
    mediaRec.onstop = ()=>{
      clearInterval(recTimer);
      stream.getTracks().forEach(t=>t.stop());
      const blob = new Blob(recChunks, {type: mediaRec.mimeType || "audio/webm"});
      const secs = recSecs;
      recLive=false; recUI();
      if(blob.size > 25*1024*1024){ toast("التسجيل كبير جداً"); return; }
      const fr = new FileReader();
      fr.onload = ()=>{
        editing.audios.push({dataUrl:fr.result, secs, at:Date.now()});
        renderAudios(); toast("أُضيف التسجيل ✓");
      };
      fr.readAsDataURL(blob);
    };
    mediaRec.start();
    recLive = true; recUI();
    recTimer = setInterval(()=>{ recSecs++; if(recSecs>=MAX_REC){ try{mediaRec.stop();}catch(e){} } recUI(); },1000);
  }catch(e){ toast("تعذّر فتح الميكروفون"); }
}
function stopRecorderSilently(){
  clearInterval(recTimer);
  if(mediaRec && mediaRec.state==="recording"){ try{mediaRec.stop();}catch(e){} }
  recLive=false;
}
function recUI(){
  const b = document.getElementById("tRec"); if(!b) return;
  b.classList.toggle("rec", recLive); b.classList.toggle("pulse", recLive);
  b.innerHTML = (recLive?I.stop:I.wave)+'<span>'+(recLive?("إيقاف "+recSecs+" ث"):"تسجيل")+'</span>';
}

/* ─────────── الصور ─────────── */
function compressImage(file, maxSide=1200, quality=0.75){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(Math.max(w,h)>maxSide){ const k=maxSide/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const cv = document.createElement("canvas");
        cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
document.getElementById("imgPick").addEventListener("change", async e=>{
  const files = Array.from(e.target.files||[]); e.target.value="";
  if(!files.length || !editing) return;
  if(editing.images.length + files.length > 8){ toast("الحد الأقصى ٨ صور"); return; }
  try{
    for(const f of files.slice(0,8)) editing.images.push(await compressImage(f));
    renderImages(); toast("أُرفقت ✓");
  }catch(err){ toast("تعذّر قراءة الصورة"); }
});

/* ─────────── قفل يوم كامل ─────────── */
async function lockDay(key){
  const targets = notes.filter(n=>!n.locked && dayKey(n.createdAt)===key);
  if(!targets.length) return;
  if(!(await askConfirm("قفل اليوم كاملاً","سيتم تشفير "+targets.length+" مذكرة.","قفل الكل"))) return;
  const p = await ensurePass("أدخل كلمة السر لقفل اليوم");
  if(!p) return;
  for(const n of targets){
    const rec = await lockNoteRecord(n);
    rec.updatedAt = n.updatedAt;
    await dbPut(rec);
    const i = notes.findIndex(x=>x.id===n.id);
    notes[i] = rec;
    delete unlocked[n.id];
  }
  toast("قُفلت مذكرات اليوم 🔒");
  renderList();
}

    + '<button class="settings-item" data-a="import">'+I.upload+'<span>استعادة من نسخة<small>دمج نسخة سابقة مع الحالية</small></span></button>'
    + '<button class="settings-item" data-a="pass">'+I.key+'<span>'+(sec?"تغيير كلمة السر":"إنشاء كلمة السر")+'<small>'+(sec?"يعاد تشفير كل المقفلة":"مطلوبة للقفل")+'</small></span></button>'
    + '</div><div class="modal-buttons" style="margin-top:14px"><button class="modal-btn ghost" data-a="close">إغلاق</button></div>');
  v.querySelector('[data-a=close]').onclick = ()=>v.remove();
  v.querySelector('[data-a=export]').onclick = ()=>{ v.remove(); exportBackup(); };
  v.querySelector('[data-a=import]').onclick = ()=>{ v.remove(); document.getElementById("bakPick").click(); };
  v.querySelector('[data-a=pass]').onclick = async ()=>{ v.remove(); await changePassword(); };
}

async function exportBackup(){
  try{
    const payload = { app:"smart-notes-local", version:1, exportedAt:new Date().toISOString(), sec:sec||null, notes:await dbAllNotes() };
    const blob = new Blob([JSON.stringify(payload)], {type:"application/json"});
    const a = document.createElement("a");
    const d = new Date();
    a.href = URL.createObjectURL(blob);
    a.download = "نسخة-مذكراتي-"+d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    toast("صُدّرت النسخة ✓");
  }catch(e){ toast("تعذّر التصدير"); }
}

document.getElementById("bakPick").addEventListener("change", async e=>{
  const f = e.target.files[0]; e.target.value="";
  if(!f) return;
  try{
    const data = JSON.parse(await f.text());
    if(data.app!=="smart-notes-local" || !Array.isArray(data.notes)) throw 0;
    let added=0, updated=0;
    for(const n of data.notes){
      if(!n || !n.id) continue;
      const cur = notes.find(x=>x.id===n.id);
      if(!cur){ await dbPut(n); notes.push(n); added++; }
      else if((n.updatedAt||0) > (cur.updatedAt||0)){ await dbPut(n); notes[notes.indexOf(cur)]=n; updated++; }
    }
    if(!sec && data.sec){ sec = data.sec; await metaSet("sec", sec); }
    notes.sort((a,b)=>b.updatedAt-a.updatedAt);
    toast("أُضيفت "+added+" وحُدّثت "+updated+" ✓");
    renderList();
  }catch(err){ toast("الملف ليس نسخة صالحة"); }
});

async function changePassword(){
  if(!sec){ await ensurePass(); return; }
  const old = await askPassword("أدخل كلمة السر الحالية");
  if(!old) return;
  const np = await askNewPassword();
  if(!np) return;
  const lockedNotes = notes.filter(n=>n.locked);
  try{
    const newSalt = b64(crypto.getRandomValues(new Uint8Array(16)));
    for(const n of lockedNotes){
      const payload = await decObj(n.enc, old);
      n.enc = await encObj(payload, np, newSalt);
      await dbPut(n);
    }
    const verifier = await encObj({ok:1}, np, newSalt);
    sec = { salt:newSalt, verifier };
    await metaSet("sec", sec);
    sessionPass = np;
    toast("غُيّرت كلمة السر ✓");
  }catch(e){ toast("بعض المذكرات لم تُفتح بالكلمة القديمة"); }
}

boot();
</script>
